{{- $position := .Get "position" | default "top" -}}
{{- $type := .Get "type" | default "banner" -}}

<div class="ad-placeholder ad-{{ $type }} ad-{{ $position }}">
    <div class="ad-content">
        <p class="ad-label">Advertisement</p>
        <div class="ad-space">
            <p>{{ $type | title }} Ad Space ({{ $position }})</p>
            <p>728x90 or responsive</p>
        </div>
    </div>
</div>
