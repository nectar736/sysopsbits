<header class="site-header">
    <div class="container">
        <div class="header-content">
            <div class="site-branding">
                <a href="{{ "/" | relURL }}" class="site-title">
                    {{ .Site.Title }}
                </a>
                <p class="site-tagline">{{ .Site.Params.tagline }}</p>
            </div>
            
            <nav class="main-nav">
                <button class="nav-toggle" aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <ul class="nav-menu">
                    {{ range .Site.Menus.Main }}
                    <li>
                        <a href="{{ .URL | relURL }}" {{ if .Page.Active }}class="active"{{ end }}>
                            {{ .Name }}
                        </a>
                    </li>
                    {{ end }}
                    {{ partial "categories-dropdown.html" . }}
                </ul>
            </nav>
        </div>
    </div>
</header>
