[server]
  [server.compression]
    # Enable gzip compression
    enable = true
    # Enable Brotli compression
    brotli = true
    # Minimum content length to compress (in bytes)
    minSize = 1024
    # MIME types to compress
    types = [
      "text/html",
      "text/plain",
      "text/css",
      "text/javascript",
      "application/javascript",
      "application/json",
      "application/xml",
      "image/svg+xml"
    ]

[minify]
  # Minify HTML
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = false
      keepComments = false
    [minify.tdewolff.css]
      precision = 0
      keepComments = false
    [minify.tdewolff.js]
      precision = 0
      keepComments = false

[caches]
  [caches.getresource]
    dir = ":cacheDir/:project"
    maxAge = -1

[imaging]
  # Image processing quality (0-100)
  quality = 85
  # Resampling filter
  resampleFilter = "Lanczos"
  # Anchor for cropping
  anchor = "smart"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github-dark"
    lineNos = true
    lineNumbersInTable = true
    tabWidth = 4

baseURL = 'https://sysopsbits.com'
languageCode = 'en-us'
title = 'SysOpsBits'
description = 'Practical sysops guides, tool comparisons, and honest reviews for DevOps engineers and system administrators.'
tagline = 'Your guide to better sysops'

theme = 'sysopsbits'

[params]
  # Performance settings
  enableMinify = true
  enableInlineShortcodes = false
  [params.imageProcessing]
    enable = true
    quality = 85
  # Lazy loading for images
  lazyLoadImages = true