baseURL = 'https://sysopsbits.github.io'
languageCode = 'en-us'
title = 'SysOpsBits'
theme = 'sysopsbits'

[params]
  description = "Practical Infrastructure. No Fluff."
  author = "John"
  tagline = "Practical Infrastructure. No Fluff."
  logo = "/images/logo.png"
  
  # SEO
  enableOpenGraph = true
  enableTwitterCards = true
  enableJsonLD = true
  
  # Performance
  minify = true
  enableRobotsTXT = true
  
  # Social
  twitter = "@sysopsbits"
  
  # Monetization
  affiliateDisclosure = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github-dark"
    lineNos = true
    lineNumbersInTable = true
    tabWidth = 4

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 10

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 60
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 70

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.8

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]

[taxonomies]
  category = "categories"
  tag = "tags"

[permalinks]
  post = "/:slug/"
  page = "/:slug/"
  categories = "/categories/:slug/"
  tags = "/tags/:slug/"